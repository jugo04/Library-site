<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Автори</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
            text-align: center;
        }

        .authors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .author-card {
            background: white;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .author-card:hover {
            transform: scale(1.03);
        }

        .author-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 10px;
            background: #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #555;
        }

        .author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .author-books-count {
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>

<h1>Автори</h1>

<div class="authors-grid">
    {% for author in authors %}
        <div class="author-card" onclick="window.location.href='/author/{{ author.id }}/'">

            <div class="author-avatar">
                {% if author.photo %}
                    <img src="{{ author.photo.url }}" alt="{{ author.name }}">
                {% else %}
                    {{ author.name|first }}
                {% endif %}
            </div>

            <div class="author-name">{{ author.name }}</div>

            <div class="author-books-count">
                {{ author.books.count }} книг(и)
            </div>

        </div>
    {% endfor %}
</div>

</body>
</html>
