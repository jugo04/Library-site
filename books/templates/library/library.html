<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library</title>
</head>
<body>
    <h1>Бібліотека</h1>

<ul>
    {% for book in books %}
        <li>
            {% if book.cover %}
            <img src="{{ book.cover.url }}" alt="{{ book.name }}" width="150"><br>
            {% else %}
                <p>Обкладинка відсутня</p>
            {% endif %}
            <a href="{% url 'book' book.id %}">{{ book.name }}</a><br>
            Автор: {{ book.author }}<br>
            Жанр: {{ book.genre }}<br>
        </li>
    {% empty %}
        <p>Немає книг у бібліотеці</p>
    {% endfor %}
</ul>

</body>
</html>
