<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ book.name }}</title>
</head>
<body>

    <h1>{{ book.name }}</h1>

    <img src="{{ book.cover.url }}" alt="Обкладинка" width="200">
    <div style="background-color: lightblue;"><a href="{{ book.file.url }}" target="_blank">Читати онлайн</a>
</div>

    <p><strong>Автор:</strong> {{ book.author }}</p>
    <p><strong>Жанр:</strong> {{ book.genre }}</p>
    <p><strong>Рік:</strong> {{ book.year }}</p>

    <p><strong>Опис:</strong></p>
    <p>{{ book.description }}</p>

    <br>
    <a href="{% url 'library' %}">⬅ Повернутися до всіх книг</a>

</body>
</html>
